services:
  - type: web
    name: amp-beton-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci && npx prisma generate
    startCommand: node src/app.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES
        value: 15m
      - key: JWT_REFRESH_EXPIRES
        value: 7d
      - key: FRONTEND_URL
        sync: false
      - key: LOG_LEVEL
        value: info
