[build]
  command = "cd frontend && npm install && npm run build"
  publish = "frontend/dist"

[build.environment]
  NODE_VERSION    = "20"
  VITE_API_URL    = "https://cental-betonerp.onrender.com/api"
  VITE_SOCKET_URL = "https://central-beton-erp.onrender.com"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
